<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SagaTalu Flasher</title>
  <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js"></script>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 60px auto;
      padding: 0 20px;
      text-align: center;
      background: #f9f9f9;
      color: #222;
    }
    h1 { font-size: 2em; margin-bottom: 0.2em; }
    p { line-height: 1.6; color: #444; }
    esp-web-install-button {
      margin-top: 30px;
    }
    .note {
      margin-top: 40px;
      font-size: 0.85em;
      color: #888;
    }
  </style>
</head>
<body>
  <h1>SagaTalu</h1>
  <p>Custom firmware for the Xteink X4.<br>
  Focused writing and reading with wireless file management.</p>

  <esp-web-install-button
    manifest="manifest.json">
  </esp-web-install-button>

  <p class="note">
    Requires Chrome, Edge, or Opera browser.<br>
    Connect your Xteink X4 via USB-C before clicking Install.
  </p>
</body>
</html>
